<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Render · 시맨틱 레이어 증강</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* 디자인 시스템: NL2SQL-Agent 정렬 (다크 · 앰버 · IBM Plex) */
:root{
  --bg:#0c0e11; --panel:#14171c; --rule:#272c34; --border:#272c34;
  --text:#dadee4; --muted:#8b929d; --dim:#8b929d; --faint:#5b626c;
  --accent:#e8b341; --sig:#6aa9e0; --lin:#b291e6;
  --high:#4ec98a; --med:#e8b341; --low:#e06b5e;
  --sans:'IBM Plex Sans KR',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5}
#root{min-height:100vh}
::-webkit-scrollbar{width:9px;height:9px} ::-webkit-scrollbar-thumb{background:var(--rule);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}
button{font-family:var(--mono)}
select option{background:#14171c;color:var(--text)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<!-- 로컬 키 주입(선택, gitignore) -->
<script src="local-config.js" onerror="void 0"></script>

<!-- 데이터셋 결정 (localStorage 저장, 기본 mock) -->
<script>
(function() {
  const stored = localStorage.getItem("render_dataset");
  window.RENDER_DATASET = (stored === "fineract" || stored === "mock") ? stored : "mock";
})();
</script>

<!-- 데이터 번들 (선택된 데이터셋만 로드) -->
<script>
(function() {
  const ds = window.RENDER_DATASET;
  // 캐시 버스팅: script tag URL에 buildTag 붙여 GitHub Pages CDN + 브라우저 캐시 회피.
  // Fineract 데이터셋은 시드 갱신 빈도가 있어 stale 파일을 피해야 함.
  // buildTag는 이 파일 자체가 재배포될 때 자동 갱신됨 (deploy timestamp 근사).
  const buildTag = "202607130854";
  const q = "?v=" + buildTag;
  const files = ds === "fineract"
    ? ["data/signal-store-fineract.js", "data/corpus-index-fineract.js"]
    : ["data/signal-store.js",          "data/corpus-index.js"];
  files.forEach(src => document.write('<script src="' + src + q + '"><\/script>'));
})();
</script>
<!-- 스냅샷: 데이터셋별로 다른 파일 (없으면 조용히 무시, 스냅샷 불러오기만 비활성) -->
<script>
(function() {
  const ds = window.RENDER_DATASET;
  const src = ds === "fineract"
    ? "data/render-snapshot-data-v3-fineract.js?v=202607130854"
    : "data/render-snapshot-data-v3.js?v=202607130801e";
  document.write('<script src="' + src + '" onerror="void 0"><\/script>');
})();
</script>

<!-- 로직 -->
<script src="js/render-meta.js"></script>
<!-- Fineract 데이터셋일 때만 TABLE_LABEL/TABLE_ORDER 오버라이드 -->
<script>
if (window.RENDER_DATASET === "fineract") {
  document.write('<script src="data/render-meta-fineract.js?v=202607130801a"><\/script>');
}
</script>
<script src="js/agent.js"></script>
<script src="js/prompt-v3.js"></script>
<script src="js/prompt-mapper.js"></script>
<script src="js/mapper-agent.js"></script>
<script src="data/mapper-seeds-fineract.js"></script>
<script src="data/mapper-snapshot-data-v0-fineract.js"></script>
<script src="js/live-api.js"></script>

<!-- UI (in-browser JSX) -->
<script type="text/babel" src="js/render-screen.jsx"></script>
<script type="text/babel" src="js/mapper-screen.jsx"></script>
<script type="text/babel" src="js/explorer.jsx"></script>
<script type="text/babel" src="js/intro.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
