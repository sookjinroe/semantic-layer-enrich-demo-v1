<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Render v2 · 시맨틱 레이어 증강</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* 디자인 시스템: NL2SQL-Agent 정렬 (다크 · 앰버 · IBM Plex) */
:root{
  --bg:#0c0e11; --panel:#14171c; --rule:#272c34; --ink:#dadee4; --dim:#8b929d; --faint:#5b626c;
  --accent:#e8b341; --t2:#6aa9e0; --lin:#b291e6;
  --high:#4ec98a; --med:#e8b341; --low:#e06b5e;
  --sans:'IBM Plex Sans KR',system-ui,sans-serif; --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
#root,.app{height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:9px;height:9px} ::-webkit-scrollbar-thumb{background:var(--rule);border-radius:5px}
button{font-family:var(--mono);cursor:pointer;border:1px solid var(--rule);background:var(--panel);
  color:var(--ink);border-radius:6px;padding:5px 11px;font-size:12.5px}
button:disabled{opacity:.45;cursor:default}
select{font-family:var(--mono);border:1px solid var(--rule);background:var(--panel);color:var(--ink);border-radius:6px;padding:5px 8px;font-size:12.5px}

.hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 20px;
  border-bottom:1px solid var(--rule);background:var(--panel)}
.hdr-title{font-family:var(--sans);font-weight:600;font-size:18px;letter-spacing:-.01em}
.hdr-title .v{color:var(--accent)}
.hdr-title .sub{font-family:var(--mono);font-weight:400;font-size:11.5px;color:var(--dim);margin-left:12px}
.hdr-tools{display:flex;gap:8px;align-items:center}
.hdr-tools .snap{font-size:12px;color:var(--dim);display:flex;gap:4px;align-items:center}
.run-all{background:var(--accent);color:#0c0e11;border-color:var(--accent);font-weight:600}

.body{flex:1;display:flex;min-height:0}
.left{width:330px;border-right:1px solid var(--rule);overflow-y:auto;background:var(--panel)}
.left-head{padding:11px 16px;font-size:11.5px;color:var(--dim);border-bottom:1px solid var(--rule);
  position:sticky;top:0;background:var(--panel);display:flex;justify-content:space-between;align-items:center;font-family:var(--mono)}
.left-head .save{font-size:11px;padding:3px 8px}
.col-row{padding:10px 16px;border-bottom:1px solid var(--rule);cursor:pointer;transition:background .1s}
.col-row:hover{background:rgba(232,179,65,.06)}
.col-row.active{background:rgba(232,179,65,.10);border-left:3px solid var(--accent);padding-left:13px}
.col-row-top{display:flex;align-items:center;gap:8px}
.cid{font-family:var(--mono);font-size:12.5px;font-weight:500}
.rh{font-size:10px;background:var(--low);color:#0c0e11;padding:1px 6px;border-radius:8px;margin-left:auto;font-weight:600}
.arch{font-size:11px;color:var(--dim);margin-top:3px;margin-left:17px}

.right{flex:1;overflow-y:auto;padding:24px 30px}
.trace-head{margin-bottom:20px}
.th-cid{font-family:var(--mono);font-size:17px;font-weight:500}
.th-arch{font-size:13px;color:var(--accent);margin-top:4px}
.seed{display:flex;gap:14px;margin-top:10px;font-family:var(--mono);font-size:11.5px;color:var(--dim);flex-wrap:wrap}
.seed span{background:var(--bg);border:1px solid var(--rule);border-radius:5px;padding:2px 8px}
.run{margin-top:14px;background:var(--accent);color:#0c0e11;border-color:var(--accent);font-weight:600;padding:7px 18px}
.spin{margin-top:14px;display:inline-block;color:var(--accent);font-size:13px}

.steps{display:flex;flex-direction:column;gap:10px;max-width:760px}
.step{border:1px solid var(--rule);border-radius:8px;padding:11px 14px;background:var(--panel)}
.step.t2{border-left:3px solid var(--t2)}
.step.verify{border-left:3px solid var(--accent);background:rgba(232,179,65,.05)}
.step.err{color:var(--low);border-color:var(--low)}
.step-head{display:flex;align-items:center;gap:9px}
.badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.03em}
.badge.t1{background:var(--rule);color:var(--dim)}
.badge.t2{background:var(--t2);color:#0c0e11}
.op{font-family:var(--mono);font-size:13px;font-weight:500}
.vtag{font-size:10px;background:var(--accent);color:#0c0e11;padding:1px 7px;border-radius:8px;margin-left:auto;font-weight:600}
.think{font-size:12.5px;color:var(--dim);margin-top:6px;font-style:italic}
.result{font-family:var(--mono);font-size:11.5px;color:var(--ink);margin-top:6px;
  background:var(--bg);border-radius:5px;padding:6px 8px;word-break:break-all}

.answer{border:1px solid var(--accent);border-radius:10px;padding:16px 18px;background:#16130c;margin-top:6px}
.answer-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.conf{font-size:11px;font-weight:700;color:#0c0e11;padding:3px 11px;border-radius:8px;letter-spacing:.04em}
.rh-banner{font-size:12px;color:var(--low);font-weight:500}
.desc{font-family:var(--sans);font-size:14.5px;line-height:1.65;color:var(--ink)}
.meta{margin-top:12px}
.ev{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--rule);
  border-radius:6px;padding:2px 8px;color:var(--dim)}
.conflicts{margin-top:10px}
.conflict{font-size:12px;background:rgba(224,107,94,.10);border:1px solid rgba(224,107,94,.35);
  border-radius:6px;padding:7px 10px;margin-top:5px;color:var(--ink)}
.conflict b{font-family:var(--mono);font-size:11px;color:var(--low)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

<script src="local-config.js" onerror="void 0"></script>
<script src="data/signal-store.js"></script>
<script src="data/corpus-index.js"></script>
<script src="data/render-snapshot-data.js"></script>
<script src="js/agent.js"></script>
<script src="js/live-api.js"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
